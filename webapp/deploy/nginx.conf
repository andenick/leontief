# nginx.conf — Wassily (Leontief) I-O website
# Alternative reverse-proxy to Caddyfile (for parity with Gerhard).
# Use this if you prefer nginx over Caddy.
# For TLS: add port 443 server block + certbot, or terminate at Cloudflare edge.
#
# Place in container: /etc/nginx/conf.d/default.conf
# (mount via docker-compose volumes: ./nginx.conf:/etc/nginx/conf.d/default.conf:ro)

server {
    listen 80;
    server_name leontief.nickanderson.us _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml
               application/x-font-woff2 font/woff2;
    gzip_min_length 1024;
    gzip_vary on;

    client_max_body_size 8m;

    # Static assets — long cache TTL (versioned by Jinja/webpack hash or
    # manually incremented filenames)
    location /static/ {
        proxy_pass         http://app:8080;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    }

    # Main application
    location / {
        proxy_pass             http://app:8080;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        proxy_connect_timeout  10s;
    }

    # Health check — silence access logs
    location /healthz {
        proxy_pass   http://app:8080/healthz;
        access_log   off;
    }
}
