<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site_title }} — {{ tagline }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ tagline }}{% endblock %}">

  <!-- KaTeX (math rendering — vendored, no CDN) -->
  <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">

  <!-- Arcanum Site Kit (ASK) v1 — shared chrome + leontief indigo theme (vendored, no CDN) -->
  <link rel="stylesheet" href="/static/_shared/arcanum.css?v={{ asset_ver }}">
  <link rel="stylesheet" href="/static/_shared/themes/leontief.css?v={{ asset_ver }}">
  <link rel="icon" href="/static/_shared/favicon.svg" type="image/svg+xml">

  <!-- Site stylesheet (page-body + prose layout; kit owns header/footer chrome) -->
  <link rel="stylesheet" href="/static/css/site.css?v={{ asset_ver }}">

  <!-- Pygments code-highlight stylesheet -->
  <link rel="stylesheet" href="/static/vendor/pygments.css">

  <!-- Plotly (vendored, no CDN) -->
  <script src="/static/vendor/plotly.min.js"></script>

  <!-- Arcanum Site Kit v1.1 — shared Plotly theming + download buttons (after plotly) -->
  <script defer src="/static/_shared/ark-plotly.js?v={{ asset_ver }}"></script>
  <script defer src="/static/_shared/ark-downloads.js?v={{ asset_ver }}"></script>
  <script defer src="/static/_shared/ark-chart.js?v={{ asset_ver }}"></script>
  <script defer src="/static/_shared/ark-table.js?v={{ asset_ver }}"></script>
  <script defer src="/static/_shared/ark-code.js?v={{ asset_ver }}"></script>

  <!-- KaTeX runtime (vendored) -->
  <script defer src="/static/vendor/katex/katex.min.js"></script>
  <script defer src="/static/vendor/katex/auto-render.min.js"
          onload="renderMathInElement(document.body, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$',  right: '$',  display: false}
            ],
            throwOnError: false
          });"></script>

  <!-- App JS (chart hydration, code-copy buttons) -->
  <script defer src="/static/js/app.js?v={{ asset_ver }}"></script>

  <!-- I-O Table Explorer CSS + JS (loaded globally; also hydrates table embeds) -->
  <link rel="stylesheet" href="/static/css/tables.css?v={{ asset_ver }}">
  <script src="/static/js/tables.js?v={{ asset_ver }}" defer></script>

  {% block head_extra %}{% endblock %}
</head>
<body>

<!-- ------------------------------------------------------------------ -->
<!-- Shared chrome: ASK header (mark + ecosystem switcher + nav)           -->
<!-- ------------------------------------------------------------------ -->
{% include "_shared/header.html" %}

<!-- ------------------------------------------------------------------ -->
<!-- Page content (#ark-main = skip-link target)                          -->
<!-- ------------------------------------------------------------------ -->
<div id="ark-main">
{% block content %}{% endblock %}
</div>

<!-- ------------------------------------------------------------------ -->
<!-- Shared chrome: ASK v2 action footer (compact triad + Cite +          -->
<!-- mandated dual-anchor colophon). ONE footer per page.                 -->
<!-- ------------------------------------------------------------------ -->
{% include "_shared/action-footer.html" with context %}

{% block body_scripts %}{% endblock %}

<!-- ASK chrome enhancer (no-JS-degradable switcher + copy buttons) -->
<script>
  window.ARK_CONFIG = {
    site_key: "{{ site_key }}",
    dpr_url: "{{ dpr_url | default('/methodology', true) }}",
    ecosystem_url: "/static/_shared/ecosystem.json"
  };
  window.ARK_TRACK = { site: "{{ site_key }}", endpoint: "/__track" };
</script>
<script src="/static/_shared/arcanum-chrome.js?v={{ asset_ver }}" defer></script>
<!-- ASK v2 Research Triad + action-footer hydration (Code & Data First) -->
<script src="/static/_shared/ark-track.js?v={{ asset_ver }}" defer></script>
<script src="/static/_shared/ark-triad.js?v={{ asset_ver }}" defer></script>
</body>
</html>
